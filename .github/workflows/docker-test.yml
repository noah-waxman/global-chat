name: Global Chat Project

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-sanity-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: latest

      - name: Create CI .env
        run: |
          echo "FRONTEND_PORT=5173" >> .env
          echo "BACKEND_PORT=3000" >> .env
          echo "DB_USER=test" >> .env
          echo "DB_PASS=test" >> .env
          echo "DB_NAME=test" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_HOST=database" >> .env
          echo "SESSION_SECRET=SECRET" >> .env
          echo "VITE_BACKEND_URL=backend" >> .env

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for all services to become healthy
        run: |
          timeout 120 bash -c '
            until \
              [ "$(docker inspect -f "{{.State.Health.Status}}" database)" = "healthy" ] && \
              [ "$(docker inspect -f "{{.State.Health.Status}}" backend)" = "healthy" ] && \
              [ "$(docker inspect -f "{{.State.Health.Status}}" frontend)" = "healthy" ]; do
              sleep 3
            done
          '

      - name: Smoke test endpoints
        run: |
          curl -sf http://localhost:3000/health

          # Register a test user, save cookies for session
          curl -sf -c cookies.txt -X POST http://localhost:3000/auth/register \
            -H "Content-Type: application/json" \
            -d '{"displayName":"CI Test","email":"citest@example.com","password":"testpass123"}' \
            -o register.json
          cat register.json

          # Confirm session persisted — /auth/me should now say authenticated
          curl -sf -b cookies.txt http://localhost:3000/auth/me | grep '"isAuthenticated":true'

          # Login with same credentials
          curl -sf -c cookies2.txt -X POST http://localhost:3000/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"citest@example.com","password":"testpass123"}' \
            -o login.json
          cat login.json

      - name: Show backend logs
        if: failure()
        run: docker compose logs backend

      - name: Show frontend logs
        if: failure()
        run: docker compose logs frontend

      - name: Tear down
        if: always()
        run: docker compose down -v

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: latest

      - name: Create CI .env for docker compose
        run: |
          echo "DB_USER=test" >> .env
          echo "DB_PASS=test" >> .env
          echo "DB_NAME=test" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_HOST=database" >> .env

      - name: Start database
        run: docker compose up -d database

      - name: Wait for database to be healthy
        run: |
          timeout 60 bash -c '
            until [ "$(docker inspect -f "{{.State.Health.Status}}" database)" = "healthy" ]; do
              sleep 2
            done
          '

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json # adjust path if needed

      - name: Install dependencies
        working-directory: backend # adjust if package.json is at repo root
        run: npm ci

      - name: Create .env.test for Jest
        working-directory: backend
        run: |
          echo "DB_HOST=localhost" >> .env.test
          echo "DB_USER=test" >> .env.test
          echo "DB_PASS=test" >> .env.test
          echo "DB_PORT=5432" >> .env.test
          echo "DB_NAME=test" >> .env.test
          echo "SESSION_SECRET=SECRET" >> .env.test

      - name: Run tests
        working-directory: backend
        run: npm test

      - name: Tear down
        if: always()
        run: docker compose down -v
