name: Global Chat Project

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create CI .env
        run: |
          echo "FRONTEND_PORT=5173" >> .env
          echo "BACKEND_PORT=3000" >> .env
          echo "DB_USER=test" >> .env
          echo "DB_PASS=test" >> .env
          echo "DB_NAME=test" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_HOST=database" >> .env
          echo "SESSION_SECRET=SECRET" >> .env
          echo "VITE_BACKEND_URL=backend" >> .env
      - name: Build Docker images
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml build

      - name: Start services
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml up -d

      - name: Wait for backend health
        run: |
          until curl --fail http://localhost:3000/health; do
            echo "Waiting for backend..."
            sleep 5
          done

      - name: Shutdown
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down
