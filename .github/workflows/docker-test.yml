name: Global Chat Project

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create CI .env
        run: |
          echo "FRONTEND_PORT=5173" >> .env
          echo "BACKEND_PORT=3000" >> .env
          echo "DB_USER=test" >> .env
          echo "DB_PASS=test" >> .env
          echo "DB_NAME=test" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_HOST=database" >> .env
          echo "SESSION_SECRET=SECRET" >> .env
          echo "VITE_BACKEND_URL=backend" >> .env
      - name: Build Docker images
        run: docker compose build
      - name: Start stack and wait for healthy
        run: |
          docker compose up -d
          # Wait for services to report healthy, fail fast if they don't
          timeout 90 bash -c '
            until [ "$(docker inspect -f "{{.State.Health.Status}}" backend 2>/dev/null)" = "healthy" ]; do
              sleep 3
            done
          '
