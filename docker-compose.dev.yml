# docker-compose.dev.yml

services:
  frontend:
    container_name: frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "${FRONTEND_PORT}:5173"
    develop:
      watch:
        - action: rebuild
          path: package.json
        - action: sync+restart
          path: ./frontend
          target: /app
          initial_sync: true
          ignore:
            - node_modules/

  backend:
    container_name: backend
    command: npm start
    ports:
      - "${BACKEND_PORT}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:3000/health'',r=>process.exit(r.statusCode===200?0:1))"',
        ]

  database:
    restart: unless-stopped
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
