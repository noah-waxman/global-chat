# docker-compose.dev.yml

services:
  frontend:
    container_name: frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "${FRONTEND_PORT}:5173"
    develop:
      watch:
        - action: rebuild
          path: package.json
        - action: sync+restart
          path: ./frontend
          target: /app
          initial_sync: true
          ignore:
            - node_modules/

  backend:
    build:
      context: backend/.
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:3000"
    depends_on:
      database:
        condition: service_healthy

  database:
    restart: unless-stopped
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
