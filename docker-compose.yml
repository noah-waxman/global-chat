# docker-compose.yml

services:
  frontend:
    build:
      context: frontend/.
    env_file:
      - .env

  backend:
    build:
      context: backend/.
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy

  database:
    build:
      context: database/.
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$DB_USER -d $$DB_NAME"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
