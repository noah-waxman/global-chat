services:
  frontend:
    build: frontend/.
    container_name: frontend
    env_file:
      - .env
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    develop:
      watch:
        - action: rebuild
          path: package.json
        - action: sync+restart
          path: ./frontend
          target: /app
          initial_sync: true
          ignore:
            - node_modules/
  backend:
    build: backend/.
    container_name: backend
    env_file:
      - .env
    command: npm start
    ports:
      - "${BACKEND_PORT}:3000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://localhost:3000/health'', r => process.exit(r.statusCode === 200 ? 0 : 1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    develop:
      watch:
        - action: rebuild
          path: package.json
        - action: sync+restart
          path: ./
          target: /app
          initial_sync: true
          ignore:
            - node_modules/

  database:
    build: database/.
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$DB_USER -d $$DB_NAME"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:
